<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="flame" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <linearGradient id="flameinner" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFCA28"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- House silhouette (solid white) -->
  <path d="M32 8 L55 28 L50 28 L50 56 L14 56 L14 28 L9 28 Z"
        fill="white" opacity="0.95"/>

  <!-- Door cutout (reveals background) -->
  <rect x="26" y="42" width="12" height="14" rx="2" fill="url(#bg)"/>

  <!-- Outer flame -->
  <path d="M32 29
           C32 29 24 37 24 43
           C24 47.4 27.6 51 32 51
           C36.4 51 40 47.4 40 43
           C40 37 32 29 32 29 Z"
        fill="url(#flame)"/>

  <!-- Inner flame highlight -->
  <path d="M32 35
           C32 35 28.5 39.5 28.5 42.5
           C28.5 44.7 30 46 32 46
           C34 46 35.5 44.7 35.5 42.5
           C35.5 39.5 32 35 32 35 Z"
        fill="url(#flameinner)" opacity="0.9"/>
</svg>
