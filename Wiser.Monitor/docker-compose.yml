services:
  wiser-monitor:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      TIME_ZONE: "${TIME_ZONE:-Europe/London}"
    volumes:
      - wiser_monitor_data:/data
      - wiser_monitor_dpkeys:/root/.aspnet/DataProtection-Keys
    restart: unless-stopped

volumes:
  wiser_monitor_data:
  wiser_monitor_dpkeys:
