services:
  wiser-monitor:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8080"
    volumes:
      - wiser_monitor_data:/data
    restart: unless-stopped

volumes:
  wiser_monitor_data:
